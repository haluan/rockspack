name: Publish Rockspack Multi-Arch Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docker/ubuntu/DOCKERFILE
      - .github/workflows/publish-rocksdb.yml

env:
  IMAGE_NAME: haluan/rockspack
  ROCKSDB_VERSION: "11.1.1"
  ROCKSDB_COMMIT_SHORT: "6cdeb9d"
  UBUNTU_VERSION: "26.04"

jobs:
  publish:
    name: Build and push multi-arch Rockspack image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Rockspack multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu/DOCKERFILE
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.ROCKSDB_VERSION }}-ubuntu${{ env.UBUNTU_VERSION }}-devel
            ${{ env.IMAGE_NAME }}:${{ env.ROCKSDB_VERSION }}-ubuntu${{ env.UBUNTU_VERSION }}-${{ env.ROCKSDB_COMMIT_SHORT }}-devel
          build-args: |
            UBUNTU_VERSION=${{ env.UBUNTU_VERSION }}
            ROCKSDB_VERSION=v${{ env.ROCKSDB_VERSION }}
            ROCKSDB_COMMIT_SHA=6cdeb9d9d0630763327f512e6255cab33f6834e7

      - name: Verify published image manifest and current platform
        run: |
          ./scripts/verify-image.sh \
            --image "${IMAGE_NAME}:rockspack-${ROCKSDB_VERSION}-ubuntu${UBUNTU_VERSION}-devel" \
            --platforms "linux/amd64 linux/arm64" \
            --ubuntu-version "${UBUNTU_VERSION}" \
            --run all

      - name: Verify pinned image tag
        run: |
          ./scripts/verify-image.sh \
            --image "${IMAGE_NAME}:rockspack-${ROCKSDB_VERSION}-ubuntu${UBUNTU_VERSION}-${ROCKSDB_COMMIT_SHORT}-devel" \
            --platforms "linux/amd64 linux/arm64" \
            --ubuntu-version "${UBUNTU_VERSION}" \
            --run skip
