name: Publish Rockspack Multi-Arch Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docker/ubuntu/DOCKERFILE
      - .github/workflows/publish-rockspack.yml

env:
  IMAGE_NAME: haluan/rockspack
  ROCKSDB_VERSION: "11.1.1"
  ROCKSDB_COMMIT_SHORT: "6cdeb9d"
  UBUNTU_VERSION: "26.04"
  IMAGE_TAG_CURRENT: rockspack-11.1.1-ubuntu26.04-devel
  IMAGE_TAG_PINNED: rockspack-11.1.1-ubuntu26.04-6cdeb9d-devel

jobs:
  publish:
    name: Build and push multi-arch Rockspack image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Rockspack multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu/DOCKERFILE
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG_CURRENT }}
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG_PINNED }}
          build-args: |
            UBUNTU_VERSION=${{ env.UBUNTU_VERSION }}
            ROCKSDB_VERSION=v${{ env.ROCKSDB_VERSION }}
            ROCKSDB_COMMIT_SHA=6cdeb9d9d0630763327f512e6255cab33f6834e7

      - name: Verify published image manifest and current platform
        run: |
          ./scripts/verify-image.sh \
            --image "${IMAGE_NAME}:${IMAGE_TAG_CURRENT}" \
            --platforms "linux/amd64 linux/arm64" \
            --ubuntu-version "${UBUNTU_VERSION}" \
            --run all

      - name: Verify pinned image tag
        run: |
          ./scripts/verify-image.sh \
            --image "${IMAGE_NAME}:${IMAGE_TAG_PINNED}" \
            --platforms "linux/amd64 linux/arm64" \
            --ubuntu-version "${UBUNTU_VERSION}" \
            --run skip
